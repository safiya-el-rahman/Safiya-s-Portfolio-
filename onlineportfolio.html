<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safiya El-Rahman | CS Portfolio</title>

<style>
:root {
    --teal: #0f766e;
    --teal-light: #ccfbf1;
    --gold: #d4af37;
    --gold-light: #fff7d6;
    --dark: #0f172a;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: linear-gradient(135deg, var(--teal-light), var(--gold-light));
    color: var(--dark);
}

nav {
    position: sticky;
    top: 0;
    background: white;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    z-index: 10;
}

button {
    border: 2px solid var(--gold);
    background: var(--teal);
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: var(--gold);
    color: var(--dark);
    transform: translateY(-2px);
}

.star {
    position: fixed;
    color: var(--gold);
    opacity: 0.4;
    font-size: 18px;
    animation: float 6s infinite ease-in-out;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

main {
    width: 90%;
    max-width: 1000px;
    margin: 40px auto;
}

.page {
    display: none;
    background: white;
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.active { display: block; }

h1 {
    color: var(--teal);
    border-bottom: 2px solid var(--gold);
    padding-bottom: 8px;
}

h2 { color: var(--gold); }

.project {
    background: #f8fafc;
    padding: 20px;
    margin: 20px 0;
    border-radius: 15px;
    border-left: 5px solid var(--teal);
}

.link {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background: var(--gold);
    color: black;
    text-decoration: none;
    border-radius: 20px;
    font-weight: bold;
}

.link:hover {
    background: var(--teal);
    color: white;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

td, th {
    border: 1px solid #ddd;
    padding: 10px;
    vertical-align: top;
}

th {
    background: var(--teal-light);
}
